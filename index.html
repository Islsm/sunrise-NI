<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সানরাইজ নার্সিং ইন্সটিটিউট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0fdf4; }
        .hidden-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://image2url.com/r2/default/images/1772025076092-d9a4b77c-81a1-4224-8742-ce1533712806.jpg" alt="Logo" class="h-10 w-10 rounded-full">
                <h1 class="text-green-700 font-bold text-base">SUNRISE NURSING INSTITUTE</h1>
            </div>
            <i class="fas fa-bars text-green-700"></i>
        </div>
    </header>

    <div class="w-full h-48 overflow-hidden">
        <img src="https://image2url.com/r2/default/images/1772025318652-12951592-8450-49c6-bd80-47cbc2f8faaa.jpg" class="w-full h-full object-cover shadow-inner">
    </div>

    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="showSection('admission')" class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm border border-green-100 text-green-700 font-bold">
                <i class="fas fa-user-plus text-2xl mb-2"></i> অনলাইন ভর্তি
            </button>
            <button onclick="showSection('result')" class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm border border-green-100 text-green-700 font-bold">
                <i class="fas fa-file-invoice text-2xl mb-2"></i> ফলাফল
            </button>
            <button onclick="showSection('notice-list')" class="flex flex-col items-center p-4 bg-green-600 rounded-xl shadow-md text-white font-bold animate-pulse">
                <i class="fas fa-bullhorn text-2xl mb-2"></i> নোটিশ দেখুন
            </button>
            <button onclick="showSection('contact')" class="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm border border-green-100 text-green-700 font-bold">
                <i class="fas fa-phone-alt text-2xl mb-2"></i> যোগাযোগ
            </button>
        </div>

        <div id="notice-list" class="hidden-section mt-8">
            <h2 class="text-lg font-bold text-green-800 mb-4 border-b-2 border-green-200 pb-2 italic">সাম্প্রতিক নোটিশসমূহ:</h2>
            <div class="space-y-3">
                <div onclick="openImageModal('https://image2url.com/r2/default/images/1772031024266-482801ce-3113-4104-85f6-3981330a7ae7.jpg', '২য় বর্ষ ক্লাস রুটিন')" class="bg-white p-4 rounded-lg border-l-4 border-green-500 shadow-sm flex justify-between items-center cursor-pointer">
                    <span class="text-gray-800 font-medium">রমজান উপলক্ষ্যে ২য় বর্ষের নতুন ক্লাস রুটিন</span>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </div>
                <div onclick="openImageModal('https://image2url.com/r2/default/images/1772031054161-72615681-c992-4451-99be-825ad5bf1576.jpg', '২০২৬ একাডেমিক কার্যক্রম')" class="bg-white p-4 rounded-lg border-l-4 border-green-500 shadow-sm flex justify-between items-center cursor-pointer">
                    <span class="text-gray-800 font-medium">একাডেমিক ক্যালেন্ডার ২০২৬ ইং</span>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </div>
            </div>
            <button onclick="hideSections()" class="mt-4 text-red-500 text-sm font-bold underline">বন্ধ করুন</button>
        </div>
    </main>

    <div id="modalBox" class="fixed inset-0 bg-black bg-opacity-90 z-[999] hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white p-2 rounded-lg max-w-sm w-full">
            <div class="flex justify-between items-center mb-2 px-2">
                <span id="modalTitle" class="text-green-800 font-bold text-sm">নোটিশ</span>
                <button onclick="closeImageModal()" class="text-red-600 font-bold text-xl">&times;</button>
            </div>
            <img id="modalImg" src="" class="w-full h-auto rounded">
        </div>
    </div>

    <footer class="mt-10 py-6 text-center text-gray-500 text-xs bg-white border-t">
        <p>© ২০২৬ সানরাইজ নার্সিং ইন্সটিটিউট Devlop by Emon Islam</p>
    </footer>

    <script>
        // সেকশন দেখানোর ফাংশন
        function showSection(id) {
            hideSections(); // আগের সব বন্ধ করা
            document.getElementById(id).classList.add('active-section');
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function hideSections() {
            const sections = document.querySelectorAll('.hidden-section');
            sections.forEach(s => s.classList.remove('active-section'));
        }

        // ছবি পপ-আপ করার ফাংশন
        function openImageModal(src, title) {
            document.getElementById('modalImg').src = src;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBox').classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('modalBox').classList.add('hidden');
        }
    </script>
</body>
</html>
