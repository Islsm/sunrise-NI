<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNRISE NURSING INSTITUTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0fdf4; overflow-x: hidden; }
        
        /* Sidebar Styles */
        #sidebar {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%); /* শুরুতে ডান দিকে লুকিয়ে থাকবে */
        }
        #sidebar.open {
            transform: translateX(0); /* ক্লিক করলে সামনে আসবে */
        }
    </style>
</head>
<body>

    <header class="bg-white p-3 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="https://image2url.com/r2/default/images/1772025076092-d9a4b77c-81a1-4224-8742-ce1533712806.jpg" class="h-10 w-10">
            <div>
                <h1 class="text-green-700 font-bold text-sm uppercase">SUNRISE NURSING INSTITUTE</h1>
                <p class="text-[10px] text-gray-500">DINAJPUR</p>
            </div>
        </div>
        <button onclick="toggleMenu()" class="text-green-700 text-2xl focus:outline-none">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <div id="sidebar" class="fixed top-0 right-0 h-full w-64 bg-green-800 text-white z-[100] shadow-2xl p-6">
        <button onclick="toggleMenu()" class="text-white text-3xl absolute top-4 right-4">&times;</button>
        <div class="mt-10 space-y-6 flex flex-col font-bold text-lg">
            <a href="#" class="hover:text-yellow-400 border-b border-green-700 pb-2">হোম</a>
            <a href="#" class="hover:text-yellow-400 border-b border-green-700 pb-2">নোটিশ</a>
            <a href="#" class="hover:text-yellow-400 border-b border-green-700 pb-2">ভর্তি তথ্য</a>
            <a href="#" class="hover:text-yellow-400 border-b border-green-700 pb-2">ফলাফল</a>
            <a href="#" class="hover:text-yellow-400 border-b border-green-700 pb-2">শিক্ষকমণ্ডলী</a>
            <a href="#" class="hover:text-yellow-400 border-b border-green-700 pb-2">যোগাযোগ</a>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black opacity-50 z-[90] hidden"></div>

    <div class="bg-green-800 text-white flex items-center py-1">
        <span class="bg-yellow-400 text-black text-[10px] font-bold px-2 py-1 ml-1 whitespace-nowrap">সর্বশেষ নোটিশ:</span>
        <marquee class="text-xs">আগামী ১০ তারিখ থেকে পরীক্ষা শুরু হবে। *** আগামী ২০ তারিখ খাওয়ার আয়োজন আছে।</marquee>
    </div>

    <div class="w-full">
        <img src="https://image2url.com/r2/default/images/1772025318652-12951592-8450-49c6-bd80-47cbc2f8faaa.jpg" class="w-full h-52 object-cover">
    </div>

    <main class="p-4">
        <h2 class="text-center text-green-800 font-bold text-lg mb-6 underline decoration-green-300 underline-offset-8">প্রয়োজনীয় লিংক</h2>
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-green-50">
                <i class="fas fa-user-plus text-green-600 text-3xl mb-2"></i>
                <p class="text-gray-700 font-bold text-sm">অনলাইন ভর্তি</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-green-50">
                <i class="fas fa-file-invoice text-green-600 text-3xl mb-2"></i>
                <p class="text-gray-700 font-bold text-sm">ফলাফল</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-green-50">
                <i class="fas fa-calendar-alt text-green-600 text-3xl mb-2"></i>
                <p class="text-gray-700 font-bold text-sm">ক্লাস রুটিন</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-green-50">
                <i class="fas fa-book text-green-600 text-3xl mb-2"></i>
                <p class="text-gray-700 font-bold text-sm">সিলেবাস</p>
            </div>
        </div>
    </main>

    <script>
        // মেনু খোলা এবং বন্ধ করার ফাংশন
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
